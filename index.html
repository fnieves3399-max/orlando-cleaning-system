=== ORLANDO CLEANING GROWTH SYSTEM — SETUP ===

1. Create a project at https://supabase.com
2. Run the SQL below in Supabase → SQL Editor
3. Set SUPABASE_URL and SUPABASE_ANON_KEY (search "CONFIGURE HERE" below)

── SQL MIGRATION ──────────────────────────────────────────────────────────────

create table customers (
  id uuid default gen_random_uuid() primary key,
  user_id uuid references auth.users not null,
  first_name text not null default '', last_name text not null default '',
  phone text default '', email text default '', address text default '',
  city text default 'Orlando', zip text default '',
  lead_source text default '', customer_type text default 'Residential',
  notes text default '', status text default 'new lead',
  created_at timestamptz default now()
);

create table subcontractors (
  id uuid default gen_random_uuid() primary key,
  user_id uuid references auth.users not null,
  name text not null default '', phone text default '', email text default '',
  service_area text default '', pay_rate_type text default 'percentage',
  pay_rate numeric default 60, jobs_completed int default 0,
  rating numeric default 5.0, status text default 'active',
  notes text default '', created_at timestamptz default now()
);

create table jobs (
  id uuid default gen_random_uuid() primary key,
  user_id uuid references auth.users not null,
  customer_id uuid references customers(id) on delete set null,
  subcontractor_id uuid references subcontractors(id) on delete set null,
  address text default '', service_type text default 'Standard cleaning',
  scheduled_date date, start_time text default '', end_time text default '',
  price numeric default 0, payout numeric default 0,
  status text default 'scheduled', notes text default '',
  created_at timestamptz default now()
);

create table expenses (
  id uuid default gen_random_uuid() primary key,
  user_id uuid references auth.users not null,
  category text default 'Other', amount numeric default 0,
  notes text default '', expense_date date default current_date,
  created_at timestamptz default now()
);

alter table customers enable row level security;
alter table subcontractors enable row level security;
alter table jobs enable row level security;
alter table expenses enable row level security;

create policy "own_customers" on customers for all using (auth.uid()=user_id) with check (auth.uid()=user_id);
create policy "own_subs" on subcontractors for all using (auth.uid()=user_id) with check (auth.uid()=user_id);
create policy "own_jobs" on jobs for all using (auth.uid()=user_id) with check (auth.uid()=user_id);
create policy "own_expenses" on expenses for all using (auth.uid()=user_id) with check (auth.uid()=user_id);

───────────────────────────────────────────────────────────────────────────────
-->

  if(multiline) return <textarea value={value} onChange={onChange} placeholder={placeholder} rows={rows||3}
    onFocus={focus} onBlur={blur}
    style={{...inputSx,height:'auto',padding:'10px 13px',resize:'vertical',lineHeight:1.5}}/>;
  return <input type={type} value={value} onChange={onChange} placeholder={placeholder}
    min={min} max={max} step={step} onFocus={focus} onBlur={blur} style={inputSx} {...rest}/>;
}

/* Toast notification */
function useToast() {
  const [toast,setToast] = React.useState(null);
  const show = (msg,tone='success') => { setToast({msg,tone}); setTimeout(()=>setToast(null),3000); };
  const Toast = toast ? (
    <div style={{position:'fixed',bottom:24,right:24,zIndex:100,padding:'12px 20px',
      borderRadius:'var(--radius-md)',boxShadow:'var(--shadow-lg)',
      background:toast.tone==='success'?'var(--navy-900)':'var(--red-600)',
      color:'#fff',fontSize:'var(--text-sm)',fontWeight:600,animation:'fadeIn .2s var(--ease-out)'}}>
      {toast.msg}
    </div>
  ) : null;
  return [Toast, show];
}

   DASHBOARD SCREEN
   ================================================================ */
function Dashboard({user}) {
  const [data,setData] = React.useState(null);
  React.useEffect(()=>{
    if(!sb){setData({total:0,week:0,quotes:0,revenue:0,expenses:0,payouts:0,profit:0,jobs:[],monthly:[]});return;}
    async function load(){
      const uid=user.id; const ms=monthStart(); const ws=weekStart();
      const [[{count:total}],[{count:week}],[{count:qc}],[cjobs],[expenses],[upcoming]] = await Promise.all([
        sb.from('customers').select('*',{count:'exact',head:true}).eq('user_id',uid),
        sb.from('customers').select('*',{count:'exact',head:true}).eq('user_id',uid).gte('created_at',ws),
        sb.from('jobs').select('*',{count:'exact',head:true}).eq('user_id',uid).in('status',['scheduled','in progress']),
        sb.from('jobs').select('price,payout').eq('user_id',uid).eq('status','completed').gte('scheduled_date',ms),
        sb.from('expenses').select('amount').eq('user_id',uid).gte('expense_date',ms),
        sb.from('jobs').select('*,customer:customers(first_name,last_name,city),sub:subcontractors(name)')
          .eq('user_id',uid).not('status','eq','completed').not('status','eq','canceled')
          .order('scheduled_date').limit(6),
      ].map(p=>Promise.all([p])));
      const revenue=(cjobs.data||[]).reduce((s,j)=>s+(j.price||0),0);
      const payouts=(cjobs.data||[]).reduce((s,j)=>s+(j.payout||0),0);
      const exp=(expenses.data||[]).reduce((s,e)=>s+(e.amount||0),0);
      setData({total:total||0,week:week||0,quotes:qc||0,revenue,payouts,expenses:exp,
        profit:revenue-payouts-exp,jobs:upcoming.data||[]});
    }
    load().catch(console.error);
  },[]);

  if(!data) return <Loading/>;
  const s=data;
  const jobCols=[
    {key:'scheduled_date',header:'Date',render:(v,r)=><div>
      <div style={{fontWeight:600,color:'var(--navy-900)'}}>{fmtDate(v)}</div>
      <div style={{fontSize:'var(--text-xs)',color:'var(--text-muted)'}}>{r.start_time}</div></div>},
    {key:'customer',header:'Customer',render:(_,r)=><span style={{fontWeight:600,color:'var(--navy-900)'}}>
      {r.customer?`${r.customer.first_name} ${r.customer.last_name}`:'—'}</span>},
    {key:'service_type',header:'Service'},
    {key:'sub',header:'Sub',render:(_,r)=>r.sub?.name||'—'},
    {key:'price',header:'Price',align:'right',render:v=><span style={{fontVariantNumeric:'tabular-nums',fontWeight:600,color:'var(--navy-900)'}}>{fmt$(v)}</span>},
    {key:'status',header:'Status',render:v=><Badge status={v}/>},
  ];

  return (
    <div style={{display:'flex',flexDirection:'column',gap:'var(--space-6)'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'var(--space-4)'}}>
        <StatCard label="Revenue this month" value={fmt$(s.revenue)} tone="success" icon={<I.dollar size={18}/>} delta={s.revenue>0?'+'+fmt$(s.revenue):undefined} trend="up"/>
        <StatCard label="New leads this week" value={s.week} tone="brand" icon={<I.users size={18}/>}/>
        <StatCard label="Active jobs" value={s.quotes} tone="warning" icon={<I.calendar size={18}/>}/>
        <StatCard label="Estimated profit" value={fmt$(s.profit)} tone="navy" icon={<I.trendingUp size={18}/>}/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'var(--space-4)'}}>
        <StatCard label="Total leads" value={s.total} tone="brand" icon={<I.users size={18}/>}/>
        <StatCard label="Payouts this month" value={fmt$(s.payouts)} tone="navy" icon={<I.dollar size={18}/>}/>
        <StatCard label="Expenses this month" value={fmt$(s.expenses)} tone="warning" icon={<I.briefcase size={18}/>}/>
      </div>
      <Card padding="none">
        <div style={{padding:'var(--space-5) var(--space-6) 0'}}>
          <CardHeader title="Upcoming jobs" subtitle={`${s.jobs.length} scheduled`}/>
        </div>
        <Table style={{border:'none',borderRadius:0,boxShadow:'none'}} columns={jobCols} rows={s.jobs}/>
      </Card>
    </div>
  );
}

/* ================================================================
   QUOTE CALCULATOR
   ================================================================ */
const TYPES={'Standard cleaning':{mult:1,fixed:0},'Deep cleaning':{mult:1.5,fixed:0},
  'Move-in / move-out':{mult:1.6,fixed:0},'Airbnb turnover':{mult:1,fixed:165},'Post-construction':{mult:2,fixed:0}};
const FREQS={'One-time':0,'Weekly':.15,'Biweekly':.10,'Monthly':.05};
const ADDONS={'Inside fridge':35,'Inside oven':35,'Interior windows':60,'Laundry':25,'Dishes':15,'Inside cabinets':45,'Garage sweep':30,'Patio cleaning':40};

function Quote({user}) {
  const [sqft,setSqft]=React.useState(2000);
  const [beds,setBeds]=React.useState(3);
  const [baths,setBaths]=React.useState(2);
  const [type,setType]=React.useState('Deep cleaning');
  const [freq,setFreq]=React.useState('Biweekly');
  const [pets,setPets]=React.useState(false);
  const [addons,setAddons]=React.useState({});
  const [saved,setSaved]=React.useState(false);
  const [Toast,toast]=useToast();
  const [name,setName]=React.useState('');const[phone,setPhone]=React.useState('');const[email,setEmail]=React.useState('');

  const calc = React.useMemo(()=>{
    const t=TYPES[type];
    let base=120+sqft*.05+beds*15+baths*20;
    base=t.fixed?t.fixed+(sqft*.03):base*t.mult;
    if(pets) base+=20;
    const addon=Object.keys(addons).filter(k=>addons[k]).reduce((s,k)=>s+ADDONS[k],0);
    let total=base+addon;
    const disc=FREQS[freq];
    const disc2=total*(1-disc);
    return{low:Math.round(disc2/5)*5,high:Math.round((disc2*1.18)/5)*5,disc,addon};
  },[sqft,beds,baths,type,freq,pets,addons]);

  const toggle=k=>setAddons(a=>({...a,[k]:!a[k]}));

  const saveQuote = async () => {
    if(!sb){toast('Configure Supabase first','danger');return;}
    let cid=null;
    if(name){
      const parts=name.trim().split(' ');
      const {data:c}=await sb.from('customers').insert({
        user_id:user.id,first_name:parts[0]||'',last_name:parts.slice(1).join(' ')||'',
        phone,email,status:'quoted',customer_type:'Residential',city:'Orlando'
      }).select().single();
      cid=c?.id;
    }
    await sb.from('jobs').insert({
      user_id:user.id,customer_id:cid,service_type:type,
      price:calc.low,payout:Math.round(calc.low*.6),status:'scheduled'
    });
    setSaved(true);toast('Quote saved — lead added to CRM');
  };

  return (
    <div style={{display:'grid',gridTemplateColumns:'1.6fr 1fr',gap:'var(--space-6)',alignItems:'start'}}>
      {Toast}
      <Card>
        <CardHeader title="Build a quote" subtitle="Estimate updates live as you fill in the details"/>
        <div style={{display:'flex',flexDirection:'column',gap:'var(--space-5)'}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'var(--space-4)'}}>
            <Field label="Customer name"><Input value={name} onChange={e=>setName(e.target.value)} placeholder="Maria Lopez"/></Field>
            <Field label="Phone"><Input value={phone} onChange={e=>setPhone(e.target.value)} placeholder="(407) 555-0123"/></Field>
            <Field label="Email"><Input value={email} onChange={e=>setEmail(e.target.value)} type="email" placeholder="maria@email.com"/></Field>
            <Field label="Home sq ft"><Input type="number" value={sqft} onChange={e=>setSqft(+e.target.value||0)} min={0}/></Field>
            <Field label="Bedrooms"><Input type="number" value={beds} onChange={e=>setBeds(+e.target.value||0)} min={0}/></Field>
            <Field label="Bathrooms"><Input type="number" value={baths} onChange={e=>setBaths(+e.target.value||0)} min={0}/></Field>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'var(--space-4)'}}>
            <Field label="Cleaning type"><Sel value={type} onChange={e=>setType(e.target.value)} options={Object.keys(TYPES)}/></Field>
            <Field label="Frequency"><Sel value={freq} onChange={e=>setFreq(e.target.value)} options={Object.keys(FREQS)}/></Field>
          </div>
          <div>
            <div style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:'var(--text-sm)',color:'var(--navy-900)',marginBottom:12}}>Add-ons</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px 20px'}}>
              {Object.keys(ADDONS).map(k=>(
                <div key={k} style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <Check checked={!!addons[k]} onChange={()=>toggle(k)} label={k}/>
                  <span style={{fontFamily:'var(--font-mono)',fontSize:'var(--text-sm)',color:'var(--text-muted)'}}>+${ADDONS[k]}</span>
                </div>
              ))}
            </div>
          </div>
          <Check checked={pets} onChange={setPets} label="Pets in home (+$20)"/>
        </div>
      </Card>
      <div style={{position:'sticky',top:'calc(var(--topbar-height) + var(--space-6))',display:'flex',flexDirection:'column',gap:'var(--space-4)'}}>
        <Card accent>
          <div style={{fontFamily:'var(--font-display)',fontSize:'var(--text-xs)',fontWeight:700,letterSpacing:'.08em',textTransform:'uppercase',color:'var(--accent)'}}>Estimated price</div>
          <div style={{display:'flex',alignItems:'baseline',gap:8,margin:'8px 0 4px'}}>
            <span style={{fontFamily:'var(--font-display)',fontWeight:800,fontSize:'var(--text-4xl)',color:'var(--navy-900)',letterSpacing:'-0.02em',fontVariantNumeric:'tabular-nums'}}>{fmt$(calc.low)}</span>
            <span style={{color:'var(--text-muted)',fontWeight:600}}>– {fmt$(calc.high)}</span>
          </div>
          <div style={{fontSize:'var(--text-sm)',color:'var(--text-muted)',marginBottom:14}}>{type} · {freq}</div>
          <div style={{display:'flex',flexDirection:'column',gap:7,fontSize:'var(--text-sm)',borderTop:'1px solid var(--border)',paddingTop:14}}>
            {[['Cleaning type',type],[`Add-ons`,calc.addon>0?'+$'+calc.addon:'None'],
              calc.disc>0?['Frequency discount','−'+Math.round(calc.disc*100)+'%']:null].filter(Boolean).map(([k,v,g])=>(
              <div key={k} style={{display:'flex',justifyContent:'space-between'}}>
                <span style={{color:'var(--text-body)'}}>{k}</span>
                <span style={{fontFamily:'var(--font-mono)',fontWeight:600,color:g?'var(--green-600)':'var(--navy-900)'}}>{v}</span>
              </div>
            ))}
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:8,marginTop:18}}>
            <Btn variant="success" fullWidth leading={<I.calendar size={16}/>} onClick={saveQuote} disabled={saved}>
              {saved?'Quote saved ✓':'Save quote & add to CRM'}
            </Btn>
            <Btn variant="secondary" fullWidth leading={<I.mail size={16}/>}>Email this quote</Btn>
          </div>
        </Card>
        <Alert tone="info">Quote is auto-saved to CRM and logged when you click save.</Alert>
      </div>
    </div>
  );
}

function Finance({user}) {
  const [data,setData]=React.useState(null);
  React.useEffect(()=>{
    if(!sb){setData({revenue:0,payouts:0,expenses:0,profit:0,byService:[],byCity:[],expCats:[]});return;}
    async function load(){
      const uid=user.id;const ms=monthStart();
      const[{data:jobs},{data:exps}]=await Promise.all([
        sb.from('jobs').select('price,payout,service_type,customer:customers(city)').eq('user_id',uid).eq('status','completed').gte('scheduled_date',ms),
        sb.from('expenses').select('amount,category').eq('user_id',uid).gte('expense_date',ms),
      ]);
      const revenue=(jobs||[]).reduce((s,j)=>s+(j.price||0),0);
      const payouts=(jobs||[]).reduce((s,j)=>s+(j.payout||0),0);
      const expenses=(exps||[]).reduce((s,e)=>s+(e.amount||0),0);
      const bySvc=(jobs||[]).reduce((a,j)=>{a[j.service_type]=(a[j.service_type]||0)+(j.price||0);return a;},{});
      const byCity=(jobs||[]).reduce((a,j)=>{const c=j.customer?.city||'Unknown';a[c]=(a[c]||0)+(j.price||0);return a;},{});
      const byCat=(exps||[]).reduce((a,e)=>{a[e.category]=(a[e.category]||0)+(e.amount||0);return a;},{});
      const tot=revenue||1;
      setData({revenue,payouts,expenses,profit:revenue-payouts-expenses,
        byService:Object.entries(bySvc).map(([l,v])=>({label:l,value:Math.round(v/tot*100),amount:v})),
        byCity:Object.entries(byCity).map(([l,v])=>({label:l,value:Math.round(v/tot*100),amount:v})),
        expCats:Object.entries(byCat).map(([l,v])=>({label:l,value:Math.round(v/expenses*100),amount:v})),
        margin:revenue>0?Math.round((revenue-payouts-expenses)/revenue*100):0});
    }
    load().catch(console.error);
  },[]);
  if(!data) return <Loading/>;
  return (
    <div style={{display:'flex',flexDirection:'column',gap:'var(--space-6)'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'var(--space-4)'}}>
        <StatCard label="Revenue" value={fmt$(data.revenue)} tone="success" icon={<I.dollar size={18}/>}/>
        <StatCard label="Payouts" value={fmt$(data.payouts)} tone="navy" icon={<I.briefcase size={18}/>}/>
        <StatCard label="Expenses" value={fmt$(data.expenses)} tone="warning" icon={<I.briefcase size={18}/>}/>
        <StatCard label="Net profit" value={fmt$(data.profit)} tone="success" icon={<I.trendingUp size={18}/>}
          hint={`${data.margin}% margin`}/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'var(--space-5)'}}>
        <Card>
          <CardHeader title="Revenue by service" subtitle="This month"/>
          {data.byService.length===0?<div style={{color:'var(--text-muted)',fontSize:'var(--text-sm)'}}>No completed jobs yet.</div>:
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            {data.byService.map((r,i)=><Meter key={r.label} label={r.label} value={r.value} valueLabel={fmt$(r.amount)} tone={['success','brand','navy','warning','danger'][i%5]}/>)}
          </div>}
        </Card>
        <Card>
          <CardHeader title="Revenue by city" subtitle="This month"/>
          {data.byCity.length===0?<div style={{color:'var(--text-muted)',fontSize:'var(--text-sm)'}}>No completed jobs yet.</div>:
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            {data.byCity.map(r=><Meter key={r.label} label={r.label} value={r.value} valueLabel={fmt$(r.amount)} tone="success"/>)}
          </div>}
        </Card>
        <Card>
          <CardHeader title="Expense breakdown" subtitle="This month"/>
          {data.expCats.length===0?<div style={{color:'var(--text-muted)',fontSize:'var(--text-sm)'}}>No expenses logged.</div>:
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            {data.expCats.map((r,i)=><Meter key={r.label} label={r.label} value={r.value} valueLabel={fmt$(r.amount)} tone={['navy','brand','warning','danger'][i%4]}/>)}
          </div>}
        </Card>
      </div>
    </div>
  );
}

            <Btn variant="primary" size="lg" fullWidth type="submit" disabled={loading||!email||!pass} trailing={<I.arrowRight size={17}/>}>

function App() {
  const [session,setSession]=React.useState(null);
  const [loading,setLoading]=React.useState(true);
  const [screen,setScreen]=React.useState('dashboard');
  const [showAddLead,setShowAddLead]=React.useState(false);
  const [Toast,toast]=useToast();

  React.useEffect(()=>{
    if(!sb){setLoading(false);return;}
    sb.auth.getSession().then(({data:{session}})=>{setSession(session);setLoading(false);});
    const{data:{subscription}}=sb.auth.onAuthStateChange((_,s)=>setSession(s));
    return()=>subscription.unsubscribe();
  },[]);

  if(loading) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh'}}><Spin/></div>;
  if(!session) return <Login onLogin={()=>{}}/>;

  const s=SCREENS[screen];
  const Sc=s.comp;
  const logout=()=>sb&&sb.auth.signOut();

  return (
    <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>
      {Toast}
      <Sidebar active={screen} onNavigate={setScreen} user={session.user} onLogout={logout}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <Topbar title={s.title} subtitle={s.sub} onAddLead={()=>setShowAddLead(true)}/>

          onSaved={()=>{setShowAddLead(false);setScreen('crm');}} toast={toast}/>
      </Drawer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
