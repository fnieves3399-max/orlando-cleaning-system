=== ORLANDO CLEANING GROWTH SYSTEM — SETUP ===

1. Create a project at https://supabase.com
2. Run the SQL below in Supabase → SQL Editor
3. Set SUPABASE_URL and SUPABASE_ANON_KEY (search "CONFIGURE HERE" below)

── SQL MIGRATION ──────────────────────────────────────────────────────────────

create table customers (
  id uuid default gen_random_uuid() primary key,
  user_id uuid references auth.users not null,
  first_name text not null default '', last_name text not null default '',
  phone text default '', email text default '', address text default '',
  city text default 'Orlando', zip text default '',
  lead_source text default '', customer_type text default 'Residential',
  notes text default '', status text default 'new lead',
  created_at timestamptz default now()
);

create table subcontractors (
  id uuid default gen_random_uuid() primary key,
  user_id uuid references auth.users not null,
  name text not null default '', phone text default '', email text default '',
  service_area text default '', pay_rate_type text default 'percentage',
  pay_rate numeric default 60, jobs_completed int default 0,
  rating numeric default 5.0, status text default 'active',
  notes text default '', created_at timestamptz default now()
);

create table jobs (
  id uuid default gen_random_uuid() primary key,
  user_id uuid references auth.users not null,
  customer_id uuid references customers(id) on delete set null,
  subcontractor_id uuid references subcontractors(id) on delete set null,
  address text default '', service_type text default 'Standard cleaning',
  scheduled_date date, start_time text default '', end_time text default '',
  price numeric default 0, payout numeric default 0,
  status text default 'scheduled', notes text default '',
  created_at timestamptz default now()
);

create table expenses (
  id uuid default gen_random_uuid() primary key,
  user_id uuid references auth.users not null,
  category text default 'Other', amount numeric default 0,
  notes text default '', expense_date date default current_date,
  created_at timestamptz default now()
);

alter table customers enable row level security;
alter table subcontractors enable row level security;
alter table jobs enable row level security;
alter table expenses enable row level security;

create policy "own_customers" on customers for all using (auth.uid()=user_id) with check (auth.uid()=user_id);
create policy "own_subs" on subcontractors for all using (auth.uid()=user_id) with check (auth.uid()=user_id);
create policy "own_jobs" on jobs for all using (auth.uid()=user_id) with check (auth.uid()=user_id);
create policy "own_expenses" on expenses for all using (auth.uid()=user_id) with check (auth.uid()=user_id);

───────────────────────────────────────────────────────────────────────────────
-->

  if(multiline) return <textarea value={value} onChange={onChange} placeholder={placeholder} rows={rows||3}
    onFocus={focus} onBlur={blur}
    style={{...inputSx,height:'auto',padding:'10px 13px',resize:'vertical',lineHeight:1.5}}/>;
  return <input type={type} value={value} onChange={onChange} placeholder={placeholder}
    min={min} max={max} step={step} onFocus={focus} onBlur={blur} style={inputSx} {...rest}/>;
}

/* Toast notification */
function useToast() {
  const [toast,setToast] = React.useState(null);
  const show = (msg,tone='success') => { setToast({msg,tone}); setTimeout(()=>setToast(null),3000); };
  const Toast = toast ? (
    <div style={{position:'fixed',bottom:24,right:24,zIndex:100,padding:'12px 20px',
      borderRadius:'var(--radius-md)',boxShadow:'var(--shadow-lg)',
      background:toast.tone==='success'?'var(--navy-900)':'var(--red-600)',
      color:'#fff',fontSize:'var(--text-sm)',fontWeight:600,animation:'fadeIn .2s var(--ease-out)'}}>
      {toast.msg}
    </div>
  ) : null;
  return [Toast, show];
}

   DASHBOARD SCREEN
   ================================================================ */
function Dashboard({user}) {
  const [data,setData] = React.useState(null);
  React.useEffect(()=>{
    if(!sb){setData({total:0,week:0,quotes:0,revenue:0,expenses:0,payouts:0,profit:0,jobs:[],monthly:[]});return;}
    async function load(){
      const uid=user.id; const ms=monthStart(); const ws=weekStart();
      const [[{count:total}],[{count:week}],[{count:qc}],[cjobs],[expenses],[upcoming]] = await Promise.all([
        sb.from('customers').select('*',{count:'exact',head:true}).eq('user_id',uid),
        sb.from('customers').select('*',{count:'exact',head:true}).eq('user_id',uid).gte('created_at',ws),
        sb.from('jobs').select('*',{count:'exact',head:true}).eq('user_id',uid).in('status',['scheduled','in progress']),
        sb.from('jobs').select('price,payout').eq('user_id',uid).eq('status','completed').gte('scheduled_date',ms),
        sb.from('expenses').select('amount').eq('user_id',uid).gte('expense_date',ms),
        sb.from('jobs').select('*,customer:customers(first_name,last_name,city),sub:subcontractors(name)')
          .eq('user_id',uid).not('status','eq','completed').not('status','eq','canceled')
          .order('scheduled_date').limit(6),
      ].map(p=>Promise.all([p])));
      const revenue=(cjobs.data||[]).reduce((s,j)=>s+(j.price||0),0);
      const payouts=(cjobs.data||[]).reduce((s,j)=>s+(j.payout||0),0);
      const exp=(expenses.data||[]).reduce((s,e)=>s+(e.amount||0),0);
      setData({total:total||0,week:week||0,quotes:qc||0,revenue,payouts,expenses:exp,
        profit:revenue-payouts-exp,jobs:upcoming.data||[]});
    }
    load().catch(console.error);
  },[]);

  if(!data) return <Loading/>;
  const s=data;
  const jobCols=[
    {key:'scheduled_date',header:'Date',render:(v,r)=><div>
      <div style={{fontWeight:600,color:'var(--navy-900)'}}>{fmtDate(v)}</div>
      <div style={{fontSize:'var(--text-xs)',color:'var(--text-muted)'}}>{r.start_time}</div></div>},
    {key:'customer',header:'Customer',render:(_,r)=><span style={{fontWeight:600,color:'var(--navy-900)'}}>
      {r.customer?`${r.customer.first_name} ${r.customer.last_name}`:'—'}</span>},
    {key:'service_type',header:'Service'},
    {key:'sub',header:'Sub',render:(_,r)=>r.sub?.name||'—'},
    {key:'price',header:'Price',align:'right',render:v=><span style={{fontVariantNumeric:'tabular-nums',fontWeight:600,color:'var(--navy-900)'}}>{fmt$(v)}</span>},
    {key:'status',header:'Status',render:v=><Badge status={v}/>},
  ];

  return (
    <div style={{display:'flex',flexDirection:'column',gap:'var(--space-6)'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'var(--space-4)'}}>
        <StatCard label="Revenue this month" value={fmt$(s.revenue)} tone="success" icon={<I.dollar size={18}/>} delta={s.revenue>0?'+'+fmt$(s.revenue):undefined} trend="up"/>
        <StatCard label="New leads this week" value={s.week} tone="brand" icon={<I.users size={18}/>}/>
        <StatCard label="Active jobs" value={s.quotes} tone="warning" icon={<I.calendar size={18}/>}/>
        <StatCard label="Estimated profit" value={fmt$(s.profit)} tone="navy" icon={<I.trendingUp size={18}/>}/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'var(--space-4)'}}>
        <StatCard label="Total leads" value={s.total} tone="brand" icon={<I.users size={18}/>}/>
        <StatCard label="Payouts this month" value={fmt$(s.payouts)} tone="navy" icon={<I.dollar size={18}/>}/>
        <StatCard label="Expenses this month" value={fmt$(s.expenses)} tone="warning" icon={<I.briefcase size={18}/>}/>
      </div>
      <Card padding="none">
        <div style={{padding:'var(--space-5) var(--space-6) 0'}}>
          <CardHeader title="Upcoming jobs" subtitle={`${s.jobs.length} scheduled`}/>
        </div>
        <Table style={{border:'none',borderRadius:0,boxShadow:'none'}} columns={jobCols} rows={s.jobs}/>
      </Card>
    </div>
  );
}

/* ================================================================
   NATURAL LANGUAGE PARSERS
   ================================================================ */
const CITIES=['Winter Park','Lake Nona','Kissimmee','Windermere','Clermont','Orlando','Oviedo','Sanford','Apopka','Altamonte Springs','Maitland','Casselberry','Longwood','Doctor Phillips'];
const SOURCES=['Google','Facebook','Instagram','Yelp','Nextdoor','Referral','TikTok','Repeat','Walk-in','Other'];
const SERVICE_KEYS=['standard','deep','move-in','move-out','airbnb','turnover','post-construction','recurring'];

function parseLeadText(text) {
  const t = text.trim();
  const out = {first_name:'',last_name:'',phone:'',email:'',city:'Orlando',zip:'',lead_source:'',customer_type:'Residential',notes:'',status:'new lead'};

  // Email
  const emailM = t.match(/[\w.+-]+@[\w-]+\.\w+/);
  if(emailM) out.email = emailM[0];

  // Phone — various formats
  const phoneM = t.match(/(\(?\d{3}\)?[\s.\-]?\d{3}[\s.\-]?\d{4})/);
  if(phoneM) out.phone = phoneM[0];

  // ZIP
  const zipM = t.match(/\b\d{5}\b/);
  if(zipM) out.zip = zipM[0];

  // City
  const cityMatch = CITIES.find(c => t.toLowerCase().includes(c.toLowerCase()));
  if(cityMatch) out.city = cityMatch;

  // Lead source
  const srcMatch = SOURCES.find(s => t.toLowerCase().includes(s.toLowerCase()));
  if(srcMatch) out.lead_source = srcMatch;

  // Customer type
  if(/airbnb|vrbo|vacation rental|short.term/i.test(t)) out.customer_type = 'Airbnb host';
  else if(/realtor|real estate|listing|agent/i.test(t)) out.customer_type = 'Realtor';
  else if(/commercial|office|business/i.test(t)) out.customer_type = 'Commercial';
  else if(/property manager|hoa|complex/i.test(t)) out.customer_type = 'Property manager';

  // Status hints
  if(/quoted|quote sent/i.test(t)) out.status='quoted';
  else if(/booked|scheduled/i.test(t)) out.status='booked';
  else if(/lost|not interested|cancel/i.test(t)) out.status='lost';

  // Name — first two words that look like a name (before any comma or phone)
  const stripped = t
    .replace(/[\w.+-]+@[\w-]+\.\w+/g,'')
    .replace(/\(?\d{3}\)?[\s.\-]?\d{3}[\s.\-]?\d{4}/g,'')
    .replace(/\b\d{5}\b/g,'')
    .replace(new RegExp(CITIES.join('|'),'gi'),'')
    .replace(new RegExp(SOURCES.join('|'),'gi'),'')
    .replace(/[,|]/g,' ').replace(/\s+/g,' ').trim();

  const words = stripped.split(' ').filter(w=>w.length>1&&/^[A-Za-z]/.test(w)&&!/^(clean|deep|standard|move|airbnb|google|facebook|instagram|recurring|phone|email|wants|need|looking|she|he|they|the|and|for|with|in|at|on|is|a)/i.test(w));
  if(words[0]) out.first_name = words[0];
  if(words[1]) out.last_name = words[1];

  // Remaining as notes
  out.notes = t;
  return out;
}

function parseJobText(text, customers) {
  const t = text.trim();
  const out = {customer_id:'',address:'',service_type:'Standard cleaning',scheduled_date:today(),start_time:'09:00',end_time:'11:00',price:'',payout:'',notes:''};

  // Service type
  if(/deep/i.test(t)) out.service_type='Deep cleaning';
  else if(/move.in|move.out/i.test(t)) out.service_type='Move-in / move-out';
  else if(/airbnb|turnover/i.test(t)) out.service_type='Airbnb turnover';
  else if(/post.construction/i.test(t)) out.service_type='Post-construction';
  else if(/standard|regular/i.test(t)) out.service_type='Standard cleaning';

  // Price
  const priceM = t.match(/\$(\d+)/);
  if(priceM) {out.price=priceM[1]; out.payout=String(Math.round(+priceM[1]*.6));}

  // Time patterns: 9am, 9:00, 9:00am
  const timeM = t.match(/(\d{1,2})(?::(\d{2}))?\s*(am|pm)/i);
  if(timeM){
    let h=+timeM[1];
    const mn=timeM[2]||'00';
    if(/pm/i.test(timeM[3])&&h<12) h+=12;
    if(/am/i.test(timeM[3])&&h===12) h=0;
    out.start_time=`${String(h).padStart(2,'0')}:${mn}`;
    out.end_time=`${String(h+2).padStart(2,'0')}:${mn}`;
  }

  // Date patterns: Monday, June 30, tomorrow, next Friday, July 4
  const WEEKDAYS=['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
  const MONTHS_NAMES=['january','february','march','april','may','june','july','august','september','october','november','december'];
  const now=new Date();
  if(/tomorrow/i.test(t)){const d=new Date(now);d.setDate(d.getDate()+1);out.scheduled_date=d.toISOString().slice(0,10);}
  else {
    const wdM=t.match(new RegExp('(next\\s+)?('+WEEKDAYS.join('|')+')', 'i'));
    if(wdM){
      const target=WEEKDAYS.indexOf(wdM[2].toLowerCase());
      const cur=now.getDay();
      let diff=target-cur;
      if(diff<=0||wdM[1]) diff+=7;
      const d=new Date(now);d.setDate(d.getDate()+diff);
      out.scheduled_date=d.toISOString().slice(0,10);
    } else {
      const dateM=t.match(new RegExp('('+MONTHS_NAMES.join('|')+')\\s+(\\d{1,2})','i'));
      if(dateM){
        const mo=MONTHS_NAMES.indexOf(dateM[1].toLowerCase());
        const dy=+dateM[2];
        const d=new Date(now.getFullYear(),mo,dy);
        if(d<now) d.setFullYear(d.getFullYear()+1);
        out.scheduled_date=d.toISOString().slice(0,10);
      }
    }
  }

  // Match customer by name
  if(customers&&customers.length){
    const words=t.toLowerCase().split(/\W+/);
    const match=customers.find(c=>{
      const fn=(c.first_name||'').toLowerCase();
      const ln=(c.last_name||'').toLowerCase();
      return words.includes(fn)||words.includes(ln)||(fn&&ln&&t.toLowerCase().includes(fn+' '+ln));
    });
    if(match) out.customer_id=match.id;
  }

  out.notes=t;
  return out;
}

/* ================================================================
   QUOTE CALCULATOR
   ================================================================ */
const TYPES={'Standard cleaning':{mult:1,fixed:0},'Deep cleaning':{mult:1.5,fixed:0},
  'Move-in / move-out':{mult:1.6,fixed:0},'Airbnb turnover':{mult:1,fixed:165},'Post-construction':{mult:2,fixed:0}};
const FREQS={'One-time':0,'Weekly':.15,'Biweekly':.10,'Monthly':.05};
const ADDONS={'Inside fridge':35,'Inside oven':35,'Interior windows':60,'Laundry':25,'Dishes':15,'Inside cabinets':45,'Garage sweep':30,'Patio cleaning':40};

function Quote({user}) {
  const [sqft,setSqft]=React.useState(2000);
  const [beds,setBeds]=React.useState(3);
  const [baths,setBaths]=React.useState(2);
  const [type,setType]=React.useState('Deep cleaning');
  const [freq,setFreq]=React.useState('Biweekly');
  const [pets,setPets]=React.useState(false);
  const [addons,setAddons]=React.useState({});
  const [saved,setSaved]=React.useState(false);
  const [Toast,toast]=useToast();
  const [name,setName]=React.useState('');const[phone,setPhone]=React.useState('');const[email,setEmail]=React.useState('');

  const calc = React.useMemo(()=>{
    const t=TYPES[type];
    let base=120+sqft*.05+beds*15+baths*20;
    base=t.fixed?t.fixed+(sqft*.03):base*t.mult;
    if(pets) base+=20;
    const addon=Object.keys(addons).filter(k=>addons[k]).reduce((s,k)=>s+ADDONS[k],0);
    let total=base+addon;
    const disc=FREQS[freq];
    const disc2=total*(1-disc);
    return{low:Math.round(disc2/5)*5,high:Math.round((disc2*1.18)/5)*5,disc,addon};
  },[sqft,beds,baths,type,freq,pets,addons]);

  const toggle=k=>setAddons(a=>({...a,[k]:!a[k]}));

  const saveQuote = async () => {
    if(!sb){toast('Configure Supabase first','danger');return;}
    let cid=null;
    if(name){
      const parts=name.trim().split(' ');
      const {data:c}=await sb.from('customers').insert({
        user_id:user.id,first_name:parts[0]||'',last_name:parts.slice(1).join(' ')||'',
        phone,email,status:'quoted',customer_type:'Residential',city:'Orlando'
      }).select().single();
      cid=c?.id;
    }
    await sb.from('jobs').insert({
      user_id:user.id,customer_id:cid,service_type:type,
      price:calc.low,payout:Math.round(calc.low*.6),status:'scheduled'
    });
    setSaved(true);toast('Quote saved — lead added to CRM');
  };

  return (
    <div style={{display:'grid',gridTemplateColumns:'1.6fr 1fr',gap:'var(--space-6)',alignItems:'start'}}>
      {Toast}
      <Card>
        <CardHeader title="Build a quote" subtitle="Estimate updates live as you fill in the details"/>
        <div style={{display:'flex',flexDirection:'column',gap:'var(--space-5)'}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'var(--space-4)'}}>
            <Field label="Customer name"><Input value={name} onChange={e=>setName(e.target.value)} placeholder="Maria Lopez"/></Field>
            <Field label="Phone"><Input value={phone} onChange={e=>setPhone(e.target.value)} placeholder="(407) 555-0123"/></Field>
            <Field label="Email"><Input value={email} onChange={e=>setEmail(e.target.value)} type="email" placeholder="maria@email.com"/></Field>
            <Field label="Home sq ft"><Input type="number" value={sqft} onChange={e=>setSqft(+e.target.value||0)} min={0}/></Field>
            <Field label="Bedrooms"><Input type="number" value={beds} onChange={e=>setBeds(+e.target.value||0)} min={0}/></Field>
            <Field label="Bathrooms"><Input type="number" value={baths} onChange={e=>setBaths(+e.target.value||0)} min={0}/></Field>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'var(--space-4)'}}>
            <Field label="Cleaning type"><Sel value={type} onChange={e=>setType(e.target.value)} options={Object.keys(TYPES)}/></Field>
            <Field label="Frequency"><Sel value={freq} onChange={e=>setFreq(e.target.value)} options={Object.keys(FREQS)}/></Field>
          </div>
          <div>
            <div style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:'var(--text-sm)',color:'var(--navy-900)',marginBottom:12}}>Add-ons</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px 20px'}}>
              {Object.keys(ADDONS).map(k=>(
                <div key={k} style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <Check checked={!!addons[k]} onChange={()=>toggle(k)} label={k}/>
                  <span style={{fontFamily:'var(--font-mono)',fontSize:'var(--text-sm)',color:'var(--text-muted)'}}>+${ADDONS[k]}</span>
                </div>
              ))}
            </div>
          </div>
          <Check checked={pets} onChange={setPets} label="Pets in home (+$20)"/>
        </div>
      </Card>
      <div style={{position:'sticky',top:'calc(var(--topbar-height) + var(--space-6))',display:'flex',flexDirection:'column',gap:'var(--space-4)'}}>
        <Card accent>
          <div style={{fontFamily:'var(--font-display)',fontSize:'var(--text-xs)',fontWeight:700,letterSpacing:'.08em',textTransform:'uppercase',color:'var(--accent)'}}>Estimated price</div>
          <div style={{display:'flex',alignItems:'baseline',gap:8,margin:'8px 0 4px'}}>
            <span style={{fontFamily:'var(--font-display)',fontWeight:800,fontSize:'var(--text-4xl)',color:'var(--navy-900)',letterSpacing:'-0.02em',fontVariantNumeric:'tabular-nums'}}>{fmt$(calc.low)}</span>
            <span style={{color:'var(--text-muted)',fontWeight:600}}>– {fmt$(calc.high)}</span>
          </div>
          <div style={{fontSize:'var(--text-sm)',color:'var(--text-muted)',marginBottom:14}}>{type} · {freq}</div>
          <div style={{display:'flex',flexDirection:'column',gap:7,fontSize:'var(--text-sm)',borderTop:'1px solid var(--border)',paddingTop:14}}>
            {[['Cleaning type',type],[`Add-ons`,calc.addon>0?'+$'+calc.addon:'None'],
              calc.disc>0?['Frequency discount','−'+Math.round(calc.disc*100)+'%']:null].filter(Boolean).map(([k,v,g])=>(
              <div key={k} style={{display:'flex',justifyContent:'space-between'}}>
                <span style={{color:'var(--text-body)'}}>{k}</span>
                <span style={{fontFamily:'var(--font-mono)',fontWeight:600,color:g?'var(--green-600)':'var(--navy-900)'}}>{v}</span>
              </div>
            ))}
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:8,marginTop:18}}>
            <Btn variant="success" fullWidth leading={<I.calendar size={16}/>} onClick={saveQuote} disabled={saved}>
              {saved?'Quote saved ✓':'Save quote & add to CRM'}
            </Btn>
            <Btn variant="secondary" fullWidth leading={<I.mail size={16}/>}>Email this quote</Btn>
          </div>
        </Card>
        <Alert tone="info">Quote is auto-saved to CRM and logged when you click save.</Alert>
      </div>
    </div>
  );
}

/* ================================================================
   JOBS SCREEN + CALENDAR
   ================================================================ */
const STATUS_COLOR={scheduled:'var(--brand-600)',completed:'var(--green-600)','in progress':'var(--amber-600)',cancelled:'var(--red-500)'};

function CalendarView({jobs,onDayClick,onJobClick}) {
  const [cur,setCur]=React.useState(()=>{const d=new Date();return{y:d.getFullYear(),m:d.getMonth()};});
  const {y,m}=cur;
  const firstDay=new Date(y,m,1).getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const todayStr=new Date().toISOString().slice(0,10);
  const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  const jobsByDate={};
  (jobs||[]).forEach(j=>{
    const d=j.scheduled_date?.slice(0,10);
    if(d){if(!jobsByDate[d])jobsByDate[d]=[];jobsByDate[d].push(j);}
  });

  const cells=[];
  for(let i=0;i<firstDay;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);

  const pad=n=>String(n).padStart(2,'0');
  const dateStr=d=>`${y}-${pad(m+1)}-${pad(d)}`;

  return (
    <Card padding="none">
      <div style={{padding:'var(--space-5) var(--space-6)',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{fontFamily:'var(--font-display)',fontWeight:800,fontSize:'var(--text-lg)',color:'var(--navy-900)'}}>
          {MONTHS[m]} {y}
        </div>
        <div style={{display:'flex',gap:8}}>
          <button onClick={()=>setCur(p=>{const d=new Date(p.y,p.m-1);return{y:d.getFullYear(),m:d.getMonth()};})}
            style={{border:'1px solid var(--border)',background:'var(--surface-card)',borderRadius:'var(--radius-md)',padding:'6px 12px',cursor:'pointer',fontWeight:600,color:'var(--navy-900)'}}>‹</button>
          <button onClick={()=>setCur({y:new Date().getFullYear(),m:new Date().getMonth()})}
            style={{border:'1px solid var(--border)',background:'var(--surface-card)',borderRadius:'var(--radius-md)',padding:'6px 12px',cursor:'pointer',fontWeight:600,color:'var(--navy-900)'}}>Today</button>
          <button onClick={()=>setCur(p=>{const d=new Date(p.y,p.m+1);return{y:d.getFullYear(),m:d.getMonth()};})}
            style={{border:'1px solid var(--border)',background:'var(--surface-card)',borderRadius:'var(--radius-md)',padding:'6px 12px',cursor:'pointer',fontWeight:600,color:'var(--navy-900)'}}>›</button>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',borderBottom:'1px solid var(--border)'}}>
        {DAYS.map(d=><div key={d} style={{padding:'8px 0',textAlign:'center',fontSize:'var(--text-xs)',fontWeight:700,color:'var(--text-muted)',letterSpacing:'.06em',textTransform:'uppercase'}}>{d}</div>)}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)'}}>
        {cells.map((d,i)=>{
          if(!d) return <div key={`e${i}`} style={{minHeight:100,borderRight:'1px solid var(--border)',borderBottom:'1px solid var(--border)',background:'var(--bg-app)'}}/>;
          const ds=dateStr(d);
          const dayJobs=jobsByDate[ds]||[];
          const isToday=ds===todayStr;
          return (
            <div key={ds} onClick={()=>onDayClick(ds)}
              style={{minHeight:100,borderRight:'1px solid var(--border)',borderBottom:'1px solid var(--border)',padding:6,cursor:'pointer',background:isToday?'var(--brand-50)':'var(--surface-card)',transition:'background .15s'}}
              onMouseEnter={e=>e.currentTarget.style.background=isToday?'var(--brand-100)':'var(--bg-app)'}
              onMouseLeave={e=>e.currentTarget.style.background=isToday?'var(--brand-50)':'var(--surface-card)'}>
              <div style={{fontWeight:isToday?800:500,fontSize:'var(--text-sm)',color:isToday?'var(--brand-600)':'var(--navy-900)',marginBottom:4,
                ...(isToday?{background:'var(--brand-600)',color:'#fff',borderRadius:'50%',width:22,height:22,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12}:{})}}>
                {d}
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:2}}>
                {dayJobs.slice(0,3).map(j=>(
                  <div key={j.id} onClick={e=>{e.stopPropagation();onJobClick(j);}}
                    style={{background:STATUS_COLOR[j.status]||'var(--brand-600)',color:'#fff',borderRadius:3,padding:'2px 5px',fontSize:11,fontWeight:600,
                      overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',cursor:'pointer'}}>
                    {j.start_time?.slice(0,5)} {j.customer?`${j.customer.first_name} ${j.customer.last_name}`:j.service_type}
                  </div>
                ))}
                {dayJobs.length>3&&<div style={{fontSize:10,color:'var(--text-muted)',fontWeight:600}}>+{dayJobs.length-3} more</div>}
              </div>
            </div>
          );
        })}
      </div>
    </Card>
  );
}

function Jobs({user}) {
  const [jobs,setJobs]=React.useState([]);
  const [loading,setLoading]=React.useState(true);
  const [showAdd,setShowAdd]=React.useState(false);
  const [showQuick,setShowQuick]=React.useState(false);
  const [selJob,setSelJob]=React.useState(null);
  const [view,setView]=React.useState('calendar');
  const [Toast,toast]=useToast();
  const [customers,setCustomers]=React.useState([]);
  const [subs,setSubs]=React.useState([]);
  const [f,setF]=React.useState({customer_id:'',subcontractor_id:'',address:'',service_type:'Standard cleaning',scheduled_date:today(),start_time:'09:00',end_time:'11:00',price:'',payout:'',notes:''});
  const set=k=>e=>setF(p=>({...p,[k]:e.target.value}));

  const load=async()=>{
    if(!sb){setJobs([]);setLoading(false);return;}
    const[{data:j},{data:c},{data:s}]=await Promise.all([
      sb.from('jobs').select('*,customer:customers(first_name,last_name),sub:subcontractors(name)').eq('user_id',user.id).order('scheduled_date',{ascending:false}),
      sb.from('customers').select('id,first_name,last_name').eq('user_id',user.id),
      sb.from('subcontractors').select('id,name').eq('user_id',user.id).eq('status','active'),
    ]);
    setJobs(j||[]);setCustomers(c||[]);setSubs(s||[]);setLoading(false);
  };
  React.useEffect(()=>{load();},[]);

  const save=async e=>{
    e.preventDefault();
    if(!sb) return;
    const{error}=await sb.from('jobs').insert({...f,user_id:user.id,price:+f.price||0,payout:+f.payout||0,
      customer_id:f.customer_id||null,subcontractor_id:f.subcontractor_id||null});
    if(!error){toast('Job added');setShowAdd(false);load();}
    else toast('Error: '+error.message,'danger');
  };

  const updateStatus=async(id,status)=>{
    if(!sb) return;
    await sb.from('jobs').update({status}).eq('id',id);
    toast('Status updated');load();
    setSelJob(null);
  };

  const deleteJob=async(id)=>{
    if(!sb||!confirm('Delete this job?')) return;
    await sb.from('jobs').delete().eq('id',id);
    toast('Job deleted');load();
    setSelJob(null);
  };

  const onDayClick=(ds)=>{
    setF(p=>({...p,scheduled_date:ds}));
    setShowAdd(true);
  };

  const cols=[
    {key:'scheduled_date',header:'Date',render:(v,r)=><div>
      <div style={{fontWeight:600,color:'var(--navy-900)'}}>{fmtDate(v)}</div>
      <div style={{fontSize:'var(--text-xs)',color:'var(--text-muted)'}}>{r.start_time} – {r.end_time}</div></div>},
    {key:'customer',header:'Customer',render:(_,r)=><span style={{fontWeight:600,color:'var(--navy-900)'}}>{r.customer?`${r.customer.first_name} ${r.customer.last_name}`:'—'}</span>},
    {key:'address',header:'Address',render:v=><span style={{fontSize:'var(--text-sm)',color:'var(--text-muted)'}}>{v||'—'}</span>},
    {key:'service_type',header:'Service'},
    {key:'sub',header:'Sub',render:(_,r)=><div style={{display:'flex',alignItems:'center',gap:7}}>
      {r.sub&&<Avatar name={r.sub.name} size="xs"/>}<span>{r.sub?.name||'—'}</span></div>},
    {key:'price',header:'Price',align:'right',render:(v,r)=><div style={{textAlign:'right'}}>
      <div style={{fontVariantNumeric:'tabular-nums',fontWeight:600,color:'var(--navy-900)'}}>{fmt$(v)}</div>
      {r.payout>0&&<div style={{fontSize:'var(--text-xs)',color:'var(--green-600)'}}>payout {fmt$(r.payout)}</div>}</div>},
    {key:'status',header:'Status',render:(v,r)=><div style={{display:'flex',alignItems:'center',gap:8}}>
      <Badge status={v}/>
      {v==='scheduled'&&<button onClick={e=>{e.stopPropagation();updateStatus(r.id,'completed');}} style={{border:'none',background:'var(--green-50)',color:'var(--green-700)',borderRadius:'var(--radius-sm)',padding:'2px 8px',fontSize:'var(--text-xs)',fontWeight:700,cursor:'pointer'}}>✓</button>}
    </div>},
  ];

  const stats={sched:jobs.filter(j=>j.status==='scheduled').length,prog:jobs.filter(j=>j.status==='in progress').length,done:jobs.filter(j=>j.status==='completed').length};

  const ViewToggle=()=>(
    <div style={{display:'flex',border:'1px solid var(--border)',borderRadius:'var(--radius-md)',overflow:'hidden'}}>
      {[['calendar','Calendar'],['list','List']].map(([v,l])=>(
        <button key={v} onClick={()=>setView(v)} style={{padding:'7px 16px',border:'none',cursor:'pointer',fontWeight:600,fontSize:'var(--text-sm)',
          background:view===v?'var(--navy-900)':'var(--surface-card)',color:view===v?'#fff':'var(--text-muted)',transition:'all .15s'}}>{l}</button>
      ))}
    </div>
  );

  if(loading) return <Loading/>;
  return (
    <div style={{display:'flex',flexDirection:'column',gap:'var(--space-6)'}}>
      {Toast}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'var(--space-4)'}}>
        <StatCard label="Scheduled" value={stats.sched} tone="brand" icon={<I.calendar size={18}/>}/>
        <StatCard label="In progress" value={stats.prog} tone="warning" icon={<I.clock size={18}/>}/>
        <StatCard label="Completed" value={stats.done} tone="success" icon={<I.check size={18}/>}/>
        <StatCard label="Total jobs" value={jobs.length} tone="navy" icon={<I.briefcase size={18}/>}/>
      </div>

      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <ViewToggle/>
        <div style={{display:'flex',gap:8}}>
          <Btn variant="primary" size="sm" leading={<I.sparkles size={14}/>} onClick={()=>setShowQuick(true)}>Quick add</Btn>
          <Btn variant="secondary" size="sm" leading={<I.plus size={15}/>} onClick={()=>{setF(p=>({...p,scheduled_date:today()}));setShowAdd(true);}}>New job</Btn>
        </div>
      </div>

      {view==='calendar'
        ? <CalendarView jobs={jobs} onDayClick={onDayClick} onJobClick={setSelJob}/>
        : <Card padding="none">
            <Table style={{border:'none',borderRadius:0,boxShadow:'none'}} columns={cols} rows={jobs} onRowClick={setSelJob}/>
          </Card>
      }

      {/* Job detail drawer */}
      <Drawer open={!!selJob} onClose={()=>setSelJob(null)} title="Job details">
        {selJob&&<div style={{display:'flex',flexDirection:'column',gap:16}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            {[
              ['Date',fmtDate(selJob.scheduled_date)],
              ['Time',`${selJob.start_time||'—'} – ${selJob.end_time||'—'}`],
              ['Customer',selJob.customer?`${selJob.customer.first_name} ${selJob.customer.last_name}`:'—'],
              ['Subcontractor',selJob.sub?.name||'—'],
              ['Service',selJob.service_type||'—'],
              ['Address',selJob.address||'—'],
              ['Price',fmt$(selJob.price)],
              ['Payout',fmt$(selJob.payout)],
            ].map(([k,v])=>(
              <div key={k}><div style={{fontSize:'var(--text-xs)',color:'var(--text-muted)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.05em'}}>{k}</div>
              <div style={{fontWeight:600,color:'var(--navy-900)',marginTop:2}}>{v}</div></div>
            ))}
          </div>
          {selJob.notes&&<div style={{padding:12,background:'var(--bg-app)',borderRadius:'var(--radius-md)',fontSize:'var(--text-sm)',color:'var(--text-body)'}}>{selJob.notes}</div>}
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            <Badge status={selJob.status}/>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:8,paddingTop:8,borderTop:'1px solid var(--border)'}}>
            {selJob.status==='scheduled'&&<Btn variant="primary" fullWidth onClick={()=>updateStatus(selJob.id,'in progress')}>Mark in progress</Btn>}
            {(selJob.status==='scheduled'||selJob.status==='in progress')&&<Btn variant="success" fullWidth onClick={()=>updateStatus(selJob.id,'completed')}>Mark completed</Btn>}
            {selJob.status!=='cancelled'&&<Btn variant="secondary" fullWidth onClick={()=>updateStatus(selJob.id,'cancelled')}>Cancel job</Btn>}
            <Btn variant="danger" fullWidth onClick={()=>deleteJob(selJob.id)}>Delete job</Btn>
          </div>
        </div>}
      </Drawer>

      {/* Quick add job drawer */}
      <Drawer open={showQuick} onClose={()=>setShowQuick(false)} title="Quick add job">
        <QuickAddJob user={user} customers={customers} subs={subs} toast={toast}
          onSaved={()=>{setShowQuick(false);load();}} onClose={()=>setShowQuick(false)}/>
      </Drawer>

      {/* New job drawer */}

function Subs({user}) {
  const [subs,setSubs]=React.useState([]);
  const [loading,setLoading]=React.useState(true);
  const [showAdd,setShowAdd]=React.useState(false);
  const [Toast,toast]=useToast();
  const [f,setF]=React.useState({name:'',phone:'',email:'',service_area:'',pay_rate:60,pay_rate_type:'percentage',rating:5,notes:''});
  const set=k=>e=>setF(p=>({...p,[k]:e.target.value}));

  const load=async()=>{
    if(!sb){setSubs([]);setLoading(false);return;}
    const{data}=await sb.from('subcontractors').select('*').eq('user_id',user.id).order('created_at',{ascending:false});
    setSubs(data||[]);setLoading(false);
  };
  React.useEffect(()=>{load();},[]);

  const save=async e=>{
    e.preventDefault();
    if(!sb) return;
    const{error}=await sb.from('subcontractors').insert({...f,user_id:user.id,pay_rate:+f.pay_rate,rating:+f.rating});

/* ================================================================

   ================================================================ */
function Finance({user}) {
  const [data,setData]=React.useState(null);
  React.useEffect(()=>{
    if(!sb){setData({revenue:0,payouts:0,expenses:0,profit:0,byService:[],byCity:[],expCats:[]});return;}
    async function load(){
      const uid=user.id;const ms=monthStart();
      const[{data:jobs},{data:exps}]=await Promise.all([
        sb.from('jobs').select('price,payout,service_type,customer:customers(city)').eq('user_id',uid).eq('status','completed').gte('scheduled_date',ms),
        sb.from('expenses').select('amount,category').eq('user_id',uid).gte('expense_date',ms),
      ]);
      const revenue=(jobs||[]).reduce((s,j)=>s+(j.price||0),0);
      const payouts=(jobs||[]).reduce((s,j)=>s+(j.payout||0),0);
      const expenses=(exps||[]).reduce((s,e)=>s+(e.amount||0),0);
      const bySvc=(jobs||[]).reduce((a,j)=>{a[j.service_type]=(a[j.service_type]||0)+(j.price||0);return a;},{});
      const byCity=(jobs||[]).reduce((a,j)=>{const c=j.customer?.city||'Unknown';a[c]=(a[c]||0)+(j.price||0);return a;},{});
      const byCat=(exps||[]).reduce((a,e)=>{a[e.category]=(a[e.category]||0)+(e.amount||0);return a;},{});
      const tot=revenue||1;
      setData({revenue,payouts,expenses,profit:revenue-payouts-expenses,
        byService:Object.entries(bySvc).map(([l,v])=>({label:l,value:Math.round(v/tot*100),amount:v})),
        byCity:Object.entries(byCity).map(([l,v])=>({label:l,value:Math.round(v/tot*100),amount:v})),
        expCats:Object.entries(byCat).map(([l,v])=>({label:l,value:Math.round(v/expenses*100),amount:v})),
        margin:revenue>0?Math.round((revenue-payouts-expenses)/revenue*100):0});
    }
    load().catch(console.error);
  },[]);
  if(!data) return <Loading/>;
  return (
    <div style={{display:'flex',flexDirection:'column',gap:'var(--space-6)'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'var(--space-4)'}}>
        <StatCard label="Revenue" value={fmt$(data.revenue)} tone="success" icon={<I.dollar size={18}/>}/>
        <StatCard label="Payouts" value={fmt$(data.payouts)} tone="navy" icon={<I.briefcase size={18}/>}/>
        <StatCard label="Expenses" value={fmt$(data.expenses)} tone="warning" icon={<I.briefcase size={18}/>}/>
        <StatCard label="Net profit" value={fmt$(data.profit)} tone="success" icon={<I.trendingUp size={18}/>}
          hint={`${data.margin}% margin`}/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'var(--space-5)'}}>
        <Card>
          <CardHeader title="Revenue by service" subtitle="This month"/>
          {data.byService.length===0?<div style={{color:'var(--text-muted)',fontSize:'var(--text-sm)'}}>No completed jobs yet.</div>:
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            {data.byService.map((r,i)=><Meter key={r.label} label={r.label} value={r.value} valueLabel={fmt$(r.amount)} tone={['success','brand','navy','warning','danger'][i%5]}/>)}
          </div>}
        </Card>
        <Card>
          <CardHeader title="Revenue by city" subtitle="This month"/>
          {data.byCity.length===0?<div style={{color:'var(--text-muted)',fontSize:'var(--text-sm)'}}>No completed jobs yet.</div>:
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            {data.byCity.map(r=><Meter key={r.label} label={r.label} value={r.value} valueLabel={fmt$(r.amount)} tone="success"/>)}
          </div>}
        </Card>
        <Card>
          <CardHeader title="Expense breakdown" subtitle="This month"/>
          {data.expCats.length===0?<div style={{color:'var(--text-muted)',fontSize:'var(--text-sm)'}}>No expenses logged.</div>:
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            {data.expCats.map((r,i)=><Meter key={r.label} label={r.label} value={r.value} valueLabel={fmt$(r.amount)} tone={['navy','brand','warning','danger'][i%4]}/>)}
          </div>}
        </Card>
      </div>
    </div>
  );
}

    <div style={{display:'flex',flexDirection:'column',gap:'var(--space-6)'}}>

            <Btn variant="primary" leading={<I.sparkles size={16}/>}>Generate</Btn>
          </div>
        </div>
      </Card>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'var(--space-5)'}}>
        {SEO_DATA.map(b=>(
          <Card key={b.title}>
            <CardHeader title={b.title}/>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {b.items.map((it,i)=>(
                <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:12,
                  padding:'10px 12px',background:'var(--gray-50)',border:'1px solid var(--border)',
                  borderRadius:'var(--radius-md)',fontSize:'var(--text-sm)',color:'var(--text-body)'}}>

                    {copied===b.title+i?<I.check size={15}/>:<I.copy size={15}/>}

              ))}
            </div>
          </Card>
        ))}
      </div>
    </div>
  );
}

/* ================================================================
   LOGIN SCREEN
   ================================================================ */
function Login({onLogin}) {
  const [email,setEmail]=React.useState('');
  const [pass,setPass]=React.useState('');
  const [mode,setMode]=React.useState('login');
  const [err,setErr]=React.useState('');
  const [loading,setLoading]=React.useState(false);
  const configured = !!sb;

  const submit = async e=>{
    e.preventDefault();
    if(!configured){
      setErr('Supabase not configured — set SUPABASE_URL and SUPABASE_ANON_KEY in this file, then refresh.');
      return;
    }
    setLoading(true);setErr('');
    const fn=mode==='login'?sb.auth.signInWithPassword.bind(sb.auth):sb.auth.signUp.bind(sb.auth);
    const{error}=await fn({email,password:pass});
    setLoading(false);
    if(error)setErr(error.message);
  };

  return (
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',height:'100vh'}}>
      <div style={{background:'var(--navy-900)',color:'#fff',padding:'56px 64px',display:'flex',flexDirection:'column',justifyContent:'space-between'}}>
        <Logo size={26} tone="light"/>
        <div>
          <div className="eyebrow" style={{color:'var(--brand-300)'}}>Orlando · Winter Park · Lake Nona</div>
          <h1 style={{color:'#fff',fontSize:40,lineHeight:1.1,margin:'14px 0 16px',letterSpacing:'-0.025em'}}>Grow your cleaning business on autopilot.</h1>
          <p style={{color:'var(--text-on-navy)',fontSize:17,maxWidth:380,margin:0,lineHeight:1.6}}>Leads, quotes, jobs, subcontractors, finances and local marketing — one clean dashboard.</p>
        </div>
        <div style={{display:'flex',gap:28,color:'var(--text-on-navy)',fontSize:'var(--text-sm)'}}>
          <span><strong style={{color:'#fff',fontFamily:'var(--font-display)'}}>CRM</strong> + Quotes</span>
          <span><strong style={{color:'#fff',fontFamily:'var(--font-display)'}}>Jobs</strong> + Scheduling</span>
          <span><strong style={{color:'#fff',fontFamily:'var(--font-display)'}}>Marketing</strong> tools</span>
        </div>
      </div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',padding:40}}>
        <div style={{width:360}}>
          <h2 style={{fontSize:28,marginBottom:6}}>{mode==='login'?'Welcome back':'Create account'}</h2>
          <p style={{color:'var(--text-muted)',marginBottom:28}}>{mode==='login'?'Sign in to your dashboard.':'Start managing your cleaning business.'}</p>
          {!configured&&<Alert tone="warning" title="Setup required" style={{marginBottom:16}}>
            Add your Supabase credentials to this HTML file to enable login. See the setup instructions at the top of the file.
          </Alert>}
          {err&&<Alert tone="danger" style={{marginBottom:16}}>{err}</Alert>}
          <form onSubmit={submit} style={{display:'flex',flexDirection:'column',gap:18}}>
            <Field label="Email"><Input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="diana@orlandocleaning.co"/></Field>
            <Field label="Password"><Input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••"/></Field>
            <Btn variant="primary" size="lg" fullWidth type="submit" disabled={loading||!email||!pass} trailing={<I.arrowRight size={17}/>}>
              {loading?'Please wait…':mode==='login'?'Sign in':'Create account'}
            </Btn>
          </form>
          <p style={{color:'var(--text-muted)',fontSize:'var(--text-sm)',marginTop:20,textAlign:'center'}}>
            {mode==='login'?<>New here? <button onClick={()=>setMode('signup')} style={{color:'var(--brand-600)',fontWeight:600,border:'none',background:'none',cursor:'pointer',fontSize:'inherit'}}>Create an account</button></>
            :<>Already have an account? <button onClick={()=>setMode('login')} style={{color:'var(--brand-600)',fontWeight:600,border:'none',background:'none',cursor:'pointer',fontSize:'inherit'}}>Sign in</button></>}
          </p>
        </div>
      </div>
    </div>
  );
}

/* ================================================================
   MAIN APP
   ================================================================ */
const SCREENS={
  dashboard:{title:'Dashboard',sub:"Here's how your business is doing today",comp:Dashboard},
  crm:{title:'Leads & CRM',sub:'Manage customers from first contact to repeat booking',comp:Crm},
  quote:{title:'Quote calculator',sub:'Build an instant estimate and save it to a lead',comp:Quote},
  jobs:{title:'Jobs',sub:'Schedule, assign and track every clean',comp:Jobs},
  subs:{title:'Subcontractors',sub:'Your network of vetted local cleaners',comp:Subs},
  finance:{title:'Financials',sub:'Revenue, payouts and profit at a glance',comp:Finance},
  marketing:{title:'Marketing studio',sub:'Generate on-brand local content in seconds',comp:Marketing},
  seo:{title:'Local SEO',sub:'Rank across the Orlando metro service areas',comp:Seo},
};

function App() {
  const [session,setSession]=React.useState(null);
  const [loading,setLoading]=React.useState(true);
  const [screen,setScreen]=React.useState('dashboard');
  const [showAddLead,setShowAddLead]=React.useState(false);
  const [crmNonce,setCrmNonce]=React.useState(0);
  const [Toast,toast]=useToast();

  React.useEffect(()=>{
    if(!sb){setLoading(false);return;}
    sb.auth.getSession().then(({data:{session}})=>{setSession(session);setLoading(false);});
    const{data:{subscription}}=sb.auth.onAuthStateChange((_,s)=>setSession(s));
    return()=>subscription.unsubscribe();
  },[]);

  if(loading) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh'}}><Spin/></div>;
  if(!session) return <Login onLogin={()=>{}}/>;

  const s=SCREENS[screen];
  const Sc=s.comp;
  const logout=()=>sb&&sb.auth.signOut();

  return (
    <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>
      {Toast}
      <Sidebar active={screen} onNavigate={setScreen} user={session.user} onLogout={logout}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <Topbar title={s.title} subtitle={s.sub} onAddLead={()=>setShowAddLead(true)}/>
        <main style={{flex:1,overflowY:'auto',padding:'var(--space-7)'}}>
          <div style={{maxWidth:'var(--content-max)',margin:'0 auto'}}>
            <Sc user={session.user} key={screen==='crm'?'crm-'+crmNonce:screen}/>
          </div>
        </main>
      </div>
      <Drawer open={showAddLead} onClose={()=>setShowAddLead(false)} title="Add lead">
        <AddLeadForm user={session.user} onClose={()=>setShowAddLead(false)}
          onSaved={()=>{setShowAddLead(false);setScreen('crm');setCrmNonce(n=>n+1);}} toast={toast}/>
      </Drawer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
