<!-- @dsCard group="Colors" viewport="700x150" name="Brand — Tide Blue" subtitle="Primary scale. --brand-600 is the primary action color." -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:20px; background:var(--surface-card); }
  .row { display:flex; gap:0; border-radius:var(--radius-md); overflow:hidden; box-shadow:var(--shadow-sm); }
  .sw { flex:1; height:84px; display:flex; flex-direction:column; justify-content:flex-end; padding:8px 10px; }
  .sw span { font-family:var(--font-mono); font-size:10px; font-weight:600; }
  .name { display:flex; justify-content:space-between; margin-top:10px; font-family:var(--font-display); font-size:12px; color:var(--text-muted); }
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--brand-50)"><span style="color:var(--brand-700)">50</span></div>
    <div class="sw" style="background:var(--brand-100)"><span style="color:var(--brand-700)">100</span></div>
    <div class="sw" style="background:var(--brand-200)"><span style="color:var(--brand-800)">200</span></div>
    <div class="sw" style="background:var(--brand-300)"><span style="color:var(--brand-900)">300</span></div>
    <div class="sw" style="background:var(--brand-400)"><span style="color:#fff">400</span></div>
    <div class="sw" style="background:var(--brand-500)"><span style="color:#fff">500</span></div>
    <div class="sw" style="background:var(--brand-600)"><span style="color:#fff">600 ★</span></div>
    <div class="sw" style="background:var(--brand-700)"><span style="color:#fff">700</span></div>
    <div class="sw" style="background:var(--brand-800)"><span style="color:#fff">800</span></div>
    <div class="sw" style="background:var(--brand-900)"><span style="color:#fff">900</span></div>
  </div>
  <div class="name"><span>Tide Blue — primary actions, links, focus</span><span>★ --brand-600 #0E7DC9</span></div>
</body></html>
