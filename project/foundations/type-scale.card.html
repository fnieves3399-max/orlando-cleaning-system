<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:20px; background:var(--surface-card); }
  .r { display:flex; align-items:baseline; gap:16px; padding:3px 0; }
  .r .tok { font-family:var(--font-mono); font-size:11px; color:var(--text-muted); width:90px; flex-shrink:0; }
  .r .ex { font-family:var(--font-display); font-weight:700; color:var(--navy-900); letter-spacing:-0.01em; white-space:nowrap; }
</style></head>
<body>
  <div class="r"><span class="tok">--text-4xl</span><span class="ex" style="font-size:var(--text-4xl)">Aa 42</span></div>
  <div class="r"><span class="tok">--text-3xl</span><span class="ex" style="font-size:var(--text-3xl)">Aa 32</span></div>
  <div class="r"><span class="tok">--text-2xl</span><span class="ex" style="font-size:var(--text-2xl)">Aa 26</span></div>
  <div class="r"><span class="tok">--text-xl</span><span class="ex" style="font-size:var(--text-xl)">Aa 21</span></div>
  <div class="r"><span class="tok">--text-lg</span><span class="ex" style="font-size:var(--text-lg)">Aa 17</span></div>
  <div class="r"><span class="tok">--text-md</span><span class="ex" style="font-size:var(--text-md)">Aa 15 — body</span></div>
  <div class="r"><span class="tok">--text-sm</span><span class="ex" style="font-size:var(--text-sm)">Aa 13</span></div>
  <div class="r"><span class="tok">--text-xs</span><span class="ex" style="font-size:var(--text-xs)">Aa 12</span></div>
</body></html>
