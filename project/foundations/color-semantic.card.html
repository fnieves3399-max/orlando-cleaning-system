<!-- @dsCard group="Colors" viewport="700x150" name="Semantic Status" subtitle="Lifecycle & status colors used across leads, jobs, finance." -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:20px; background:var(--surface-card); }
  .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; }
  .item { border:1px solid var(--border); border-radius:var(--radius-md); overflow:hidden; }
  .cap { height:56px; }
  .meta { padding:8px 10px; }
  .meta b { display:block; font-family:var(--font-display); font-size:12px; color:var(--navy-900); }
  .meta span { font-family:var(--font-mono); font-size:10px; color:var(--text-muted); }
</style></head>
<body>
  <div class="grid">
    <div class="item"><div class="cap" style="background:var(--brand-600)"></div><div class="meta"><b>Info / New</b><span>--brand-600</span></div></div>
    <div class="item"><div class="cap" style="background:var(--green-600)"></div><div class="meta"><b>Success / Active</b><span>--positive</span></div></div>
    <div class="item"><div class="cap" style="background:var(--amber-500)"></div><div class="meta"><b>Warning / Pending</b><span>--warning</span></div></div>
    <div class="item"><div class="cap" style="background:var(--red-600)"></div><div class="meta"><b>Danger / Lost</b><span>--danger</span></div></div>
  </div>
</body></html>
