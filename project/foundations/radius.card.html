<!-- @dsCard group="Spacing" viewport="700x150" name="Corner Radii" subtitle="From 4px controls to pill. Cards use --radius-lg (12px)." -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:22px; background:var(--surface-card); }
  .row { display:flex; gap:18px; align-items:flex-end; }
  .item { text-align:center; }
  .box { width:74px; height:60px; background:var(--brand-100); border:1.5px solid var(--brand-300); }
  .tok { font-family:var(--font-mono); font-size:10px; color:var(--text-muted); margin-top:8px; }
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="tok">sm · 6</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="tok">md · 10</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="tok">lg · 12 ★</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="tok">xl · 16</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-2xl)"></div><div class="tok">2xl · 22</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-pill)"></div><div class="tok">pill</div></div>
  </div>
</body></html>
