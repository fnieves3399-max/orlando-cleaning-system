<!-- @dsCard group="Colors" viewport="700x150" name="Fresh Green" subtitle="Money, revenue, success & 'active' states. --green-600." -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:20px; background:var(--surface-card); }
  .row { display:flex; border-radius:var(--radius-md); overflow:hidden; box-shadow:var(--shadow-sm); }
  .sw { flex:1; height:84px; display:flex; flex-direction:column; justify-content:flex-end; padding:8px 10px; }
  .sw span { font-family:var(--font-mono); font-size:10px; font-weight:600; }
  .name { display:flex; justify-content:space-between; margin-top:10px; font-family:var(--font-display); font-size:12px; color:var(--text-muted); }
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--green-50)"><span style="color:var(--green-700)">50</span></div>
    <div class="sw" style="background:var(--green-100)"><span style="color:var(--green-700)">100</span></div>
    <div class="sw" style="background:var(--green-200)"><span style="color:var(--green-800)">200</span></div>
    <div class="sw" style="background:var(--green-300)"><span style="color:var(--green-800)">300</span></div>
    <div class="sw" style="background:var(--green-400)"><span style="color:#fff">400</span></div>
    <div class="sw" style="background:var(--green-500)"><span style="color:#fff">500</span></div>
    <div class="sw" style="background:var(--green-600)"><span style="color:#fff">600 ★</span></div>
    <div class="sw" style="background:var(--green-700)"><span style="color:#fff">700</span></div>
    <div class="sw" style="background:var(--green-800)"><span style="color:#fff">800</span></div>
  </div>
  <div class="name"><span>Fresh Green — revenue, success, active</span><span>★ --green-600 #1FA968</span></div>
</body></html>
