<!-- @dsCard group="Colors" viewport="700x170" name="Navy & Neutrals" subtitle="Deep navy structure + cool-tinted gray scale for text & surfaces." -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:20px; background:var(--surface-card); }
  .group { margin-bottom:12px; }
  .row { display:flex; border-radius:var(--radius-md); overflow:hidden; box-shadow:var(--shadow-sm); }
  .sw { flex:1; height:54px; display:flex; align-items:flex-end; padding:6px 8px; }
  .sw span { font-family:var(--font-mono); font-size:9px; font-weight:600; }
  .lbl { font-family:var(--font-display); font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--text-faint); margin:0 0 6px; }
</style></head>
<body>
  <div class="group">
    <div class="lbl">Navy / Ink</div>
    <div class="row">
      <div class="sw" style="background:var(--navy-700)"><span style="color:#fff">navy-700</span></div>
      <div class="sw" style="background:var(--navy-800)"><span style="color:#fff">navy-800</span></div>
      <div class="sw" style="background:var(--navy-900)"><span style="color:#fff">navy-900 ★</span></div>
    </div>
  </div>
  <div class="group">
    <div class="lbl">Cool neutrals</div>
    <div class="row">
      <div class="sw" style="background:var(--gray-50)"><span style="color:var(--gray-600)">50</span></div>
      <div class="sw" style="background:var(--gray-100)"><span style="color:var(--gray-600)">100</span></div>
      <div class="sw" style="background:var(--gray-200)"><span style="color:var(--gray-700)">200</span></div>
      <div class="sw" style="background:var(--gray-300)"><span style="color:var(--gray-800)">300</span></div>
      <div class="sw" style="background:var(--gray-400)"><span style="color:#fff">400</span></div>
      <div class="sw" style="background:var(--gray-500)"><span style="color:#fff">500</span></div>
      <div class="sw" style="background:var(--gray-600)"><span style="color:#fff">600</span></div>
      <div class="sw" style="background:var(--gray-700)"><span style="color:#fff">700</span></div>
      <div class="sw" style="background:var(--gray-900)"><span style="color:#fff">900</span></div>
    </div>
  </div>
</body></html>
