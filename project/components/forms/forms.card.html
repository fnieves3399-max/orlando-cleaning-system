<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 24px; background: var(--bg-app); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px 28px; max-width: 640px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const NS = window.OrlandoCleaningGrowthSystemDesignSystem_e087c1;
const { Field, Input, Select, Textarea, Checkbox } = NS;
function Demo() {
  const [pets, setPets] = React.useState(true);
  const [fridge, setFridge] = React.useState(false);
  return (
    <div className="grid">
      <Field label="First name" required><Input placeholder="Maria" /></Field>
      <Field label="Quoted price" hint="Auto-filled from calculator"><Input leading="$" defaultValue="240" trailing="est." /></Field>
      <Field label="Cleaning type"><Select placeholder="Select type" options={['Standard cleaning','Deep cleaning','Move-out cleaning','Airbnb turnover','Post-construction']} /></Field>
      <Field label="Email" error="Enter a valid email"><Input invalid defaultValue="maria@" /></Field>
      <Field label="Notes" style={{ gridColumn: '1 / -1' }}><Textarea rows={3} placeholder="Gate code, pets, parking…" /></Field>
      <div style={{ gridColumn:'1 / -1', display:'flex', gap:24 }}>
        <Checkbox checked={pets} onChange={setPets} label="Pets in home" />
        <Checkbox checked={fridge} onChange={setFridge} label="Inside fridge add-on" />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
