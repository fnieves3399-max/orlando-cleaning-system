<!-- @dsCard group="Components" viewport="700x380" name="Data — Stat cards, Table, Meter" subtitle="Dashboard KPI tiles, data table, progress meter" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 24px; background: var(--bg-app); }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 20px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const NS = window.OrlandoCleaningGrowthSystemDesignSystem_e087c1;
const { StatCard, Table, Meter, Badge } = NS;
const Dollar = () => <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 2v14M12 5.2C12 4 10.7 3.2 9 3.2S6 4 6 5.4C6 8.2 12 7.4 12 10.6 12 12 10.7 12.8 9 12.8S6 12 6 10.8" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>;
const Users = () => <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="7" cy="6" r="2.6" stroke="currentColor" strokeWidth="1.4"/><path d="M2.5 15c.4-2.6 2.3-4 4.5-4s4.1 1.4 4.5 4" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/></svg>;
function Demo() {
  const rows = [
    { id:1, name:'Maria Lopez', city:'Winter Park', status:'booked', value:'$240' },
    { id:2, name:'James Carter', city:'Lake Nona', status:'quoted', value:'$310' },
    { id:3, name:'Sunset Airbnb', city:'Kissimmee', status:'new lead', value:'$165' },
  ];
  return (
    <div>
      <div className="stats">
        <StatCard label="Revenue this month" value="$18,240" delta="+12%" trend="up" tone="success" icon={<Dollar/>} />
        <StatCard label="New leads this week" value="14" delta="+5" trend="up" tone="brand" icon={<Users/>} />
        <StatCard label="Pending quotes" value="7" tone="warning" hint="3 awaiting follow-up" />
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'1.6fr 1fr', gap:20, alignItems:'start' }}>
        <Table
          columns={[
            { key:'name', header:'Customer' },
            { key:'city', header:'City' },
            { key:'status', header:'Status', render:(v)=><Badge status={v}/> },
            { key:'value', header:'Quote', align:'right' },
          ]}
          rows={rows}
        />
        <div style={{ display:'flex', flexDirection:'column', gap:16, background:'var(--surface-card)', border:'1px solid var(--border)', borderRadius:'var(--radius-lg)', padding:'var(--space-5)', boxShadow:'var(--shadow-sm)' }}>
          <Meter value={32} tone="success" label="Profit margin" valueLabel="32%" />
          <Meter value={68} tone="brand" label="Booked vs. capacity" valueLabel="68%" />
          <Meter value={21} tone="warning" label="Marketing spend" valueLabel="21%" />
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
